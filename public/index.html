<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png">
    <title>Quiz App</title>
</head>
<body>
    <header>
        <canvas id="canvas" width="100" height="70"></canvas>
        <h1>Quiz App</h1>
    </header>

    <hr>

    <main>
        <div class="question">
            <h3 id="timer">10:00</h3>
            <h2 id="question-number"></h2>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <h4 id="question"></h4>
        </div>

        <div class="answers">
            <span>
                <input type="radio" name="answer" id="answer1">
                <label for="answer1" id="label1"></label>
            </span>

            <span>
                <input type="radio" name="answer" id="answer2">
                <label for="answer2" id="label2"></label>
            </span>

            <span>
                <input type="radio" name="answer" id="answer3">
                <label for="answer3" id="label3"></label>
            </span>

            <span>
                <input type="radio" name="answer" id="answer4">
                <label for="answer4" id="label4"></label>
            </span>

            <hr>

            <div class="buttons">
                <button class="back-btn" id="back-btn">Back</button>
                <button class="next-btn" id="next-btn">Next</button>
            </div>

        </div>

    </main>

    <hr>

    <footer>
        &copy; 2026 Quiz App. All right reserved.
    </footer>

    <script src="main.js"></script>
</body>
</html>
